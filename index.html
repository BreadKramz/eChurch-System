<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Mother of Perpetual Help - Loading...</title>
    <meta http-equiv="refresh" content="2; url=src/pages/public/index.html">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #8B4513 0%, #2c3e50 50%, #34495e 100%);
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 500px;
            width: 90%;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(139, 69, 19, 0.1), transparent);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .logo-container {
            text-align: center;
            margin-bottom: 2rem;
        }

        .church-logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(139, 69, 19, 0.3);
            box-shadow: 0 8px 25px rgba(139, 69, 19, 0.2);
            margin-bottom: 1rem;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .church-name {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }

        .church-subtitle {
            color: #8B4513;
            font-weight: 500;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 2rem 0;
        }

        .loading-ring {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(139, 69, 19, 0.2);
            border-top: 4px solid #8B4513;
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
            margin-bottom: 1.5rem;
        }

        .loading-dots {
            display: flex;
            gap: 8px;
            margin-bottom: 1rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #8B4513;
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        .loading-text {
            color: #34495e;
            font-weight: 500;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .progress-bar {
            width: 200px;
            height: 3px;
            background: rgba(139, 69, 19, 0.2);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #8B4513, #2c3e50);
            border-radius: 2px;
            animation: progress 2s ease-in-out;
        }

        @keyframes progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        .welcome-message {
            text-align: center;
            color: #34495e;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .manual-link {
            display: inline-block;
            color: #8B4513;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            padding: 0.5rem 1rem;
            border: 2px solid #8B4513;
            border-radius: 8px;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .manual-link:hover {
            background: #8B4513;
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(139, 69, 19, 0.3);
        }

        .floating-elements {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .floating-element {
            position: absolute;
            opacity: 0.1;
            animation: float 6s ease-in-out infinite;
        }

        .floating-element:nth-child(1) {
            top: 10%;
            left: 10%;
            font-size: 2rem;
            animation-delay: 0s;
        }

        .floating-element:nth-child(2) {
            top: 20%;
            right: 15%;
            font-size: 1.5rem;
            animation-delay: 2s;
        }

        .floating-element:nth-child(3) {
            bottom: 15%;
            left: 15%;
            font-size: 1.8rem;
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 640px) {
            .container {
                padding: 2rem;
                margin: 1rem;
            }

            .church-name {
                font-size: 1.75rem;
            }

            .church-logo {
                width: 100px;
                height: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="floating-elements">
            <div class="floating-element">✝️</div>
            <div class="floating-element">🙏</div>
            <div class="floating-element">⛪</div>
        </div>

        <div class="logo-container">
            <img src="src/assets/images/Perpetual Church Logo.jpg" alt="Our Mother of Perpetual Help Church Logo" class="church-logo">
            <h1 class="church-name">Our Mother of Perpetual Help</h1>
            <div class="church-subtitle">Redemptorist Church • Dumaguete City</div>
        </div>

        <div class="loading-container">
            <div class="loading-ring"></div>
            <div class="loading-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <div class="loading-text">Preparing your spiritual journey...</div>
        </div>

        <div class="welcome-message">
            <p>Welcome to our digital parish community. We're setting everything up for you to experience God's love and connect with our faith family.</p>
        </div>

        <a href="src/pages/public/index.html" class="manual-link">
            <i class="fas fa-arrow-right mr-2"></i>
            Enter the Sanctuary
        </a>
    </div>

    <script>
        // Add some interactive elements
        document.addEventListener('DOMContentLoaded', function() {
            // Add click effect to the container
            const container = document.querySelector('.container');
            container.addEventListener('click', function() {
                this.style.transform = 'scale(0.98)';
                setTimeout(() => {
                    this.style.transform = 'scale(1)';
                }, 150);
            });

            // Update loading text randomly
            const loadingTexts = [
                'Preparing your spiritual journey...',
                'Connecting with our faith community...',
                'Opening the doors of our church...',
                'Welcoming you to our parish...',
                'Setting up your sacred experience...'
            ];

            let textIndex = 0;
            setInterval(() => {
                textIndex = (textIndex + 1) % loadingTexts.length;
                document.querySelector('.loading-text').textContent = loadingTexts[textIndex];
            }, 2000);
        });
    </script>
</body>
</html>
